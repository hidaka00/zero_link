name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  rust-checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Connectord health
        run: cargo run -p connectord -- health

      - name: Connectord lifecycle smoke
        run: cargo run -p connectord -- serve --max-runtime-ms 250 --tick-ms 50

      - name: Daemon endpoint smoke
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p connectord -p zl-cli
          LOG_PATH="/tmp/connectord-daemon.log"
          ZL_CONNECTORD_TEST_STREAM_DISCONNECT_ONCE=1 target/debug/connectord serve --control-endpoint daemon://local --tick-ms 50 > "$LOG_PATH" 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          sleep 0.4
          ZL_ENDPOINT=daemon://local target/debug/zl-cli daemon-health
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-pubsub audio/asr/text ci-daemon
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-burst audio/asr/text 50
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-trace audio/asr/text 9001
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-isolation audio/asr/text ci-isolation
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-buffer-ref audio/asr/text ci-buffer-ref
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-metrics
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-acceptance audio/asr/text 2 200
          ZL_ENDPOINT=daemon://local ZL_DAEMON_SUBSCRIBE_MODE=stream target/debug/zl-cli smoke-pubsub audio/asr/text ci-daemon-stream
          ZL_ENDPOINT=daemon://local ZL_DAEMON_SUBSCRIBE_MODE=stream ZL_STREAM_FALLBACK_THRESHOLD=1 target/debug/zl-cli smoke-pubsub audio/asr/text ci-daemon-fallback
          ZL_ENDPOINT=daemon://local ZL_DAEMON_SUBSCRIBE_MODE=stream ZL_STREAM_FALLBACK_THRESHOLD=1 ZL_STREAM_TEST_FORCE_CONNECT_FAIL=1 target/debug/zl-cli smoke-subscribe audio/asr/text 400
          ZL_ENDPOINT=daemon://local ZL_DAEMON_SUBSCRIBE_MODE=stream ZL_STREAM_FALLBACK_THRESHOLD=1 ZL_STREAM_TEST_FORCE_REOPEN_FAIL=1 target/debug/zl-cli smoke-subscribe audio/asr/text 400
          health_out="$(ZL_ENDPOINT=daemon://local target/debug/zl-cli daemon-health)"
          echo "$health_out"
          echo "$health_out" | grep -q '^stream_fallback_to_pull_count=3$'
          echo "$health_out" | grep -q '^stream_fallback_connect_count=1$'
          echo "$health_out" | grep -q '^stream_fallback_reopen_count=1$'
          echo "$health_out" | grep -q '^stream_fallback_recv_count=1$'
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-control _sys/control reload '{}'
          kill "$pid"
          wait "$pid" || true

      - name: Upload daemon log (Linux)
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: daemon-log-linux-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/connectord-daemon.log
          if-no-files-found: ignore

      - name: Daemon health smoke (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo build -p connectord -p zl-cli
          $stdoutLog = Join-Path $env:RUNNER_TEMP "connectord-daemon-windows.stdout.log"
          $stderrLog = Join-Path $env:RUNNER_TEMP "connectord-daemon-windows.stderr.log"
          $savedDisconnectFlag = $env:ZL_CONNECTORD_TEST_STREAM_DISCONNECT_ONCE
          $env:ZL_CONNECTORD_TEST_STREAM_DISCONNECT_ONCE = "1"
          $proc = Start-Process -FilePath ".\\target\\debug\\connectord.exe" -ArgumentList @("serve","--control-endpoint","daemon://local","--tick-ms","50") -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog
          if ($null -eq $savedDisconnectFlag) {
            Remove-Item Env:ZL_CONNECTORD_TEST_STREAM_DISCONNECT_ONCE -ErrorAction SilentlyContinue
          } else {
            $env:ZL_CONNECTORD_TEST_STREAM_DISCONNECT_ONCE = $savedDisconnectFlag
          }
          try {
            $env:ZL_ENDPOINT = "daemon://local"
            $ok = $false
            for ($i = 0; $i -lt 10; $i++) {
              .\\target\\debug\\zl-cli.exe daemon-health
              if ($LASTEXITCODE -eq 0) {
                $ok = $true
                break
              }
              Start-Sleep -Milliseconds 300
            }
            if (-not $ok) {
              throw "daemon-health failed after retries"
            }
            .\\target\\debug\\zl-cli.exe smoke-pubsub audio/asr/text ci-daemon-win
            if ($LASTEXITCODE -ne 0) { throw "smoke-pubsub failed" }
            .\\target\\debug\\zl-cli.exe smoke-burst audio/asr/text 50
            if ($LASTEXITCODE -ne 0) { throw "smoke-burst failed" }
            .\\target\\debug\\zl-cli.exe smoke-trace audio/asr/text 9001
            if ($LASTEXITCODE -ne 0) { throw "smoke-trace failed" }
            .\\target\\debug\\zl-cli.exe smoke-isolation audio/asr/text ci-isolation
            if ($LASTEXITCODE -ne 0) { throw "smoke-isolation failed" }
            .\\target\\debug\\zl-cli.exe smoke-buffer-ref audio/asr/text ci-buffer-ref
            if ($LASTEXITCODE -ne 0) { throw "smoke-buffer-ref failed" }
            .\\target\\debug\\zl-cli.exe smoke-metrics
            if ($LASTEXITCODE -ne 0) { throw "smoke-metrics failed" }
            .\\target\\debug\\zl-cli.exe smoke-acceptance audio/asr/text 2 200
            if ($LASTEXITCODE -ne 0) { throw "smoke-acceptance failed" }
            $env:ZL_DAEMON_SUBSCRIBE_MODE = "stream"
            .\\target\\debug\\zl-cli.exe smoke-pubsub audio/asr/text ci-daemon-win-stream
            if ($LASTEXITCODE -ne 0) { throw "smoke-pubsub (stream) failed" }
            $env:ZL_STREAM_FALLBACK_THRESHOLD = "1"
            .\\target\\debug\\zl-cli.exe smoke-pubsub audio/asr/text ci-daemon-win-fallback
            if ($LASTEXITCODE -ne 0) { throw "smoke-pubsub (fallback) failed" }
            $env:ZL_STREAM_TEST_FORCE_CONNECT_FAIL = "1"
            .\\target\\debug\\zl-cli.exe smoke-subscribe audio/asr/text 400
            if ($LASTEXITCODE -ne 0) { throw "smoke-subscribe (fallback connect) failed" }
            Remove-Item Env:ZL_STREAM_TEST_FORCE_CONNECT_FAIL -ErrorAction SilentlyContinue
            $env:ZL_STREAM_TEST_FORCE_REOPEN_FAIL = "1"
            .\\target\\debug\\zl-cli.exe smoke-subscribe audio/asr/text 400
            if ($LASTEXITCODE -ne 0) { throw "smoke-subscribe (fallback reopen) failed" }
            Remove-Item Env:ZL_STREAM_TEST_FORCE_REOPEN_FAIL -ErrorAction SilentlyContinue
            $healthOut = .\\target\\debug\\zl-cli.exe daemon-health | Out-String
            if (-not ($healthOut -match 'stream_fallback_to_pull_count=3')) {
              throw "stream_fallback_to_pull_count was not 3"
            }
            if (-not ($healthOut -match 'stream_fallback_connect_count=1')) {
              throw "stream_fallback_connect_count was not 1"
            }
            if (-not ($healthOut -match 'stream_fallback_reopen_count=1')) {
              throw "stream_fallback_reopen_count was not 1"
            }
            if (-not ($healthOut -match 'stream_fallback_recv_count=1')) {
              throw "stream_fallback_recv_count was not 1"
            }
            Remove-Item Env:ZL_STREAM_FALLBACK_THRESHOLD -ErrorAction SilentlyContinue
            Remove-Item Env:ZL_DAEMON_SUBSCRIBE_MODE -ErrorAction SilentlyContinue
            .\\target\\debug\\zl-cli.exe smoke-control _sys/control reload "{}"
            if ($LASTEXITCODE -ne 0) { throw "smoke-control failed" }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Upload daemon log (Windows)
        if: failure() && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: daemon-log-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}\connectord-daemon-windows.stdout.log
            ${{ runner.temp }}\connectord-daemon-windows.stderr.log
          if-no-files-found: ignore

      - name: Smoke pubsub
        run: cargo run -p zl-cli -- smoke-pubsub audio/asr/text ci-smoke

      - name: Smoke control
        run: cargo run -p zl-cli -- smoke-control _sys/control reload '{}'

  nightly-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ZL_SOAK_MAX_DROPPED: "0"
      ZL_SOAK_MAX_P95_US: "200000"
      ZL_SOAK_MIN_THROUGHPUT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build soak targets
        run: cargo build -p connectord -p zl-cli

      - name: Soak A-01..A-05 for 10 minutes
        shell: bash
        run: |
          set -euo pipefail
          LOG_PATH="/tmp/connectord-soak.log"
          target/debug/connectord serve --control-endpoint daemon://local --tick-ms 50 > "$LOG_PATH" 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          sleep 0.4
          end_ts=$((SECONDS + 600))
          while [ "$SECONDS" -lt "$end_ts" ]; do
            ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-acceptance audio/asr/text 2 200
          done
          health_out="$(ZL_ENDPOINT=daemon://local target/debug/zl-cli daemon-health)"
          echo "$health_out"

          dropped="$(echo "$health_out" | awk -F= '/^dropped_messages=/{print $2}')"
          p95_us="$(echo "$health_out" | awk -F= '/^p95_latency_us=/{print $2}')"
          throughput="$(echo "$health_out" | awk -F= '/^throughput_per_sec=/{print $2}')"

          if [ -z "$dropped" ] || [ -z "$p95_us" ] || [ -z "$throughput" ]; then
            echo "missing soak metrics in daemon-health output"
            exit 1
          fi
          if [ "$dropped" -gt "${ZL_SOAK_MAX_DROPPED}" ]; then
            echo "dropped_messages gate failed: $dropped > ${ZL_SOAK_MAX_DROPPED}"
            exit 1
          fi
          if [ "$p95_us" -gt "${ZL_SOAK_MAX_P95_US}" ]; then
            echo "p95_latency_us gate failed: $p95_us > ${ZL_SOAK_MAX_P95_US}"
            exit 1
          fi
          if [ "$throughput" -lt "${ZL_SOAK_MIN_THROUGHPUT}" ]; then
            echo "throughput_per_sec gate failed: $throughput < ${ZL_SOAK_MIN_THROUGHPUT}"
            exit 1
          fi

          kill "$pid"
          wait "$pid" || true

      - name: Upload soak daemon log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daemon-log-soak-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/connectord-soak.log
          if-no-files-found: ignore
