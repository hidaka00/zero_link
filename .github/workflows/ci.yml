name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Smoke pubsub
        run: cargo run -p zl-cli -- smoke-pubsub audio/asr/text ci-smoke

      - name: Smoke control
        run: cargo run -p zl-cli -- smoke-control _sys/control reload '{}'
