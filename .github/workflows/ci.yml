name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Connectord health
        run: cargo run -p connectord -- health

      - name: Connectord lifecycle smoke
        run: cargo run -p connectord -- serve --max-runtime-ms 250 --tick-ms 50

      - name: Daemon endpoint smoke
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p connectord -p zl-cli
          target/debug/connectord serve --control-endpoint daemon://local --tick-ms 50 > /tmp/connectord-daemon.log 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          sleep 0.4
          ZL_ENDPOINT=daemon://local target/debug/zl-cli daemon-health
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-pubsub audio/asr/text ci-daemon
          ZL_ENDPOINT=daemon://local target/debug/zl-cli smoke-control _sys/control reload '{}'
          kill "$pid"
          wait "$pid" || true

      - name: Smoke pubsub
        run: cargo run -p zl-cli -- smoke-pubsub audio/asr/text ci-smoke

      - name: Smoke control
        run: cargo run -p zl-cli -- smoke-control _sys/control reload '{}'
